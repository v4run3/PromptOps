apiVersion: apps/v1
kind: Deployment
metadata:
  name: promptops
  namespace: promptops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: promptops
  template:
    metadata:
      labels:
        app: promptops
    spec:
      containers:
        - name: promptops
          image: promptops:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
